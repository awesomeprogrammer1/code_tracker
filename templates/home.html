<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f7f8fa;
      --surface: #ffffff;
      --border: #eee;
      --border-input: #e5e7eb;
      --text: #1a1a1a;
      --muted: #888;
      --faint: #bbb;
      --input-bg: #fafafa;
      --accent: #2bae8e;
      --accent-hover: #239b7e;
      --accent-light: #f0fdf9;
      --shadow-sm: rgba(0,0,0,.05);
      --shadow-md: rgba(0,0,0,.09);
      --shadow-card: 0 2px 12px rgba(0,0,0,.06);
    }
    body.dark {
      --bg: #111318;
      --surface: #1c1f2e;
      --border: #2a2d3e;
      --border-input: #363952;
      --text: #e2e4f0;
      --muted: #8b8fa8;
      --faint: #4a4d6a;
      --input-bg: #252838;
      --accent: #2bae8e;
      --accent-hover: #33c9a4;
      --accent-light: #0d2620;
      --shadow-sm: rgba(0,0,0,.25);
      --shadow-md: rgba(0,0,0,.4);
      --shadow-card: 0 2px 12px rgba(0,0,0,.3);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text);
      transition: background .2s, color .2s;
    }

    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; text-decoration: none; color: var(--text); }
    .brand span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 14px; }
    .logout { font-size: 13px; font-weight: 500; color: var(--muted); text-decoration: none; transition: color .2s; }
    .logout:hover { color: var(--text); }

    .dark-toggle {
      background: none;
      border: 1.5px solid var(--border-input);
      border-radius: 8px;
      padding: 5px 9px;
      font-size: 15px;
      cursor: pointer;
      line-height: 1;
      color: var(--text);
      transition: border-color .2s;
    }
    .dark-toggle:hover { border-color: var(--muted); }

    main { max-width: 780px; margin: 0 auto; padding: 48px 24px; width: 100%; }

    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 32px; font-weight: 600; letter-spacing: -0.7px; margin-bottom: 6px; }
    .page-header p { font-size: 14px; color: var(--muted); }

    .add-card {
      background: var(--surface);
      border-radius: 12px;
      box-shadow: var(--shadow-card);
      padding: 24px 28px;
      margin-bottom: 24px;
    }
    .add-card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--muted); margin-bottom: 14px; }
    .add-row { display: flex; gap: 10px; align-items: center; }
    .add-tags-row { display: flex; gap: 10px; align-items: center; margin-top: 10px; }
    .tags-hint { font-size: 12px; color: var(--muted); white-space: nowrap; }

    input[type="text"] {
      flex: 1;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid var(--border-input);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      transition: border-color .2s, background .2s;
    }
    input[type="text"]:focus { border-color: var(--accent); background: var(--surface); }

    select {
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid var(--border-input);
      border-radius: 8px;
      background: var(--input-bg);
      color: var(--text);
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }
    select:focus { border-color: var(--accent); }

    .btn-primary {
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    .toolbar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .toolbar input[type="text"] { flex: 1; min-width: 160px; }
    .toolbar select { flex-shrink: 0; }

    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 2px solid var(--border); }
    .tab {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color .15s, border-color .15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-count {
      display: inline-block;
      background: var(--border);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 20px;
      margin-left: 6px;
    }
    .tab.active .tab-count { background: var(--accent-light); color: var(--accent); }

    .todo-list { display: flex; flex-direction: column; gap: 10px; }

    .todo-item {
      background: var(--surface);
      border-radius: 10px;
      box-shadow: 0 1px 6px var(--shadow-sm);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      transition: box-shadow .2s;
    }
    .todo-item:hover { box-shadow: 0 4px 16px var(--shadow-md); }
    .todo-item.done { opacity: .5; }
    .todo-item.done .todo-name { text-decoration: line-through; color: var(--muted); }
    .todo-item.pinned { border-left: 3px solid var(--accent); }

    .todo-check { width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }

    .pin-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 15px;
      padding: 2px 3px;
      opacity: 0.25;
      transition: opacity .15s;
      flex-shrink: 0;
      line-height: 1;
    }
    .pin-btn:hover { opacity: 0.6; }
    .pin-btn.active { opacity: 1; filter: sepia(1) saturate(3) hue-rotate(110deg); }

    .todo-body { flex: 1; min-width: 0; }
    .todo-name { font-size: 15px; font-weight: 500; cursor: text; color: var(--text); }
    .todo-name:hover { color: var(--accent); }

    .todo-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .tag-chip {
      font-size: 11px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      cursor: pointer;
      transition: opacity .15s;
    }
    .tag-chip:hover { opacity: 0.75; }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .badge-easy   { background: #e8f8f3; color: #1a7a5e; }
    .badge-medium { background: #fff8e6; color: #926a00; }
    .badge-hard   { background: #fff1f1; color: #c0392b; }
    body.dark .badge-easy   { background: #0d2e20; color: #4ade98; }
    body.dark .badge-medium { background: #2e1f00; color: #fbbf24; }
    body.dark .badge-hard   { background: #2e0d0d; color: #f87171; }

    .todo-date { font-size: 12px; color: var(--faint); white-space: nowrap; }

    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      border-radius: 6px;
      border: 1.5px solid var(--border-input);
      background: var(--surface);
      cursor: pointer;
      transition: all .15s;
      color: var(--muted);
      flex-shrink: 0;
    }
    .btn-sm:hover { background: var(--input-bg); border-color: var(--muted); }
    .btn-sm.remove-btn:hover { background: #fff2f2; border-color: #fcc; color: #c00; }
    body.dark .btn-sm.remove-btn:hover { background: #2e0d0d; border-color: #7f2020; color: #f87171; }

    .edit-input {
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      padding: 4px 8px;
      background: var(--surface);
      color: var(--text);
      outline: none;
      width: 100%;
    }

    .hide-resolved-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
    }
    .hide-resolved-label input { accent-color: var(--accent); cursor: pointer; }
    .hide-resolved-label.hidden { display: none; }

    .empty { text-align: center; padding: 60px 0; color: var(--faint); font-size: 15px; }
    .empty strong { display: block; font-size: 18px; font-weight: 500; margin-bottom: 6px; }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="brand">todo<span>tracker</span></a>
    <div class="nav-right">
      <button class="dark-toggle" id="dark-toggle" title="Toggle dark mode">🌙</button>
      <a href="/logout" class="logout">Log out</a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>My To-Dos</h1>
      <p>Track your tasks and stay on top of your work.</p>
    </div>

    <div class="add-card">
      <div class="add-card-title">New To-Do</div>
      <div class="add-row">
        <input id="name" type="text" placeholder="What needs to be done?">
        <select id="difficulty">
          <option>Easy</option>
          <option>Medium</option>
          <option>Hard</option>
        </select>
        <button class="btn-primary" onclick="addTodo()">Add</button>
      </div>
      <div class="add-tags-row">
        <input id="tags" type="text" placeholder="Tags (e.g. work, school)" style="max-width:320px;">
        <span class="tags-hint">Comma-separated, optional</span>
      </div>
    </div>

    <div class="toolbar">
      <input id="search" type="text" placeholder="Search to-dos…" oninput="render()">
      <select id="filter" onchange="render()">
        <option value="All">All difficulties</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>
      <select id="tag-filter" onchange="render()">
        <option value="">All tags</option>
      </select>
      <label class="hide-resolved-label" id="hide-resolved-wrap">
        <input type="checkbox" id="hide-resolved" onchange="render()" checked>
        Hide resolved
      </label>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="recent" onclick="switchTab(this)">
        Recent <span class="tab-count" id="count-recent">0</span>
      </div>
      <div class="tab" data-tab="active" onclick="switchTab(this)">
        Active <span class="tab-count" id="count-active">0</span>
      </div>
      <div class="tab" data-tab="resolved" onclick="switchTab(this)">
        Resolved <span class="tab-count" id="count-resolved">0</span>
      </div>
    </div>

    <div class="todo-list" id="todo-list"></div>
  </main>

  <script>
    let allTodos = [];
    let currentTab = 'recent';

    // Dark mode
    const darkToggle = document.getElementById('dark-toggle');
    function applyDark(on) {
      document.body.classList.toggle('dark', on);
      darkToggle.textContent = on ? '☀️' : '🌙';
    }
    applyDark(localStorage.getItem('darkMode') === '1');
    darkToggle.addEventListener('click', () => {
      const on = !document.body.classList.contains('dark');
      localStorage.setItem('darkMode', on ? '1' : '0');
      applyDark(on);
      render(); // re-render so tag chip colors update
    });

    // Tag chip color palettes
    const TAG_LIGHT = [
      ['#dbeafe','#1d4ed8'], ['#dcfce7','#15803d'], ['#fef9c3','#854d0e'],
      ['#fce7f3','#9d174d'], ['#ede9fe','#6d28d9'], ['#ffedd5','#9a3412'],
    ];
    const TAG_DARK = [
      ['#1e3a5f','#93c5fd'], ['#14532d','#86efac'], ['#3f2900','#fde047'],
      ['#500724','#f9a8d4'], ['#2e1065','#c4b5fd'], ['#431407','#fdba74'],
    ];
    function tagHash(tag) {
      let h = 0;
      for (const c of tag) h = (h * 31 + c.charCodeAt(0)) & 0xff;
      return h % TAG_LIGHT.length;
    }
    function tagStyle(tag) {
      const palette = document.body.classList.contains('dark') ? TAG_DARK : TAG_LIGHT;
      const [bg, color] = palette[tagHash(tag)];
      return `background:${bg};color:${color}`;
    }

    // Data
    async function loadTodos() {
      const res = await fetch('/todos');
      allTodos = await res.json();
      updateTagFilter();
      render();
    }

    function parseTags(raw) {
      return (raw || '').split(',').map(t => t.trim()).filter(Boolean);
    }

    function updateTagFilter() {
      const all = new Set();
      allTodos.forEach(t => parseTags(t.tags).forEach(tag => all.add(tag)));
      const sel = document.getElementById('tag-filter');
      const current = sel.value;
      sel.innerHTML = '<option value="">All tags</option>' +
        [...all].sort().map(tag =>
          `<option value="${escapeHtml(tag)}"${tag === current ? ' selected' : ''}>${escapeHtml(tag)}</option>`
        ).join('');
    }

    function switchTab(el) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      currentTab = el.dataset.tab;
      document.getElementById('hide-resolved-wrap').classList.toggle('hidden', currentTab !== 'recent');
      render();
    }

    function render() {
      const search       = document.getElementById('search').value.trim().toLowerCase();
      const difficulty   = document.getElementById('filter').value;
      const tagFilter    = document.getElementById('tag-filter').value;
      const hideResolved = document.getElementById('hide-resolved').checked;

      let filtered = allTodos.filter(t => {
        const matchSearch = !search || t.name.toLowerCase().includes(search);
        const matchDiff   = difficulty === 'All' || t.difficulty === difficulty;
        const matchTag    = !tagFilter || parseTags(t.tags).includes(tagFilter);
        return matchSearch && matchDiff && matchTag;
      });

      const active   = filtered.filter(t => t.status !== 'Done');
      const resolved = filtered.filter(t => t.status === 'Done');
      document.getElementById('count-recent').textContent   = filtered.length;
      document.getElementById('count-active').textContent   = active.length;
      document.getElementById('count-resolved').textContent = resolved.length;

      let display;
      if (currentTab === 'active')        display = active;
      else if (currentTab === 'resolved') display = resolved;
      else {
        display = [...filtered].reverse();
        if (hideResolved) display = display.filter(t => t.status !== 'Done');
      }

      display.sort((a, b) => (b.pinned === 'Yes') - (a.pinned === 'Yes'));

      const diffClass = { Easy: 'badge-easy', Medium: 'badge-medium', Hard: 'badge-hard' };
      const list = document.getElementById('todo-list');

      if (!display.length) {
        list.innerHTML = `<div class="empty"><strong>Nothing here</strong>${
          currentTab === 'active'   ? 'No active to-dos.'     :
          currentTab === 'resolved' ? 'Nothing resolved yet.' :
          'Add your first to-do above.'
        }</div>`;
        return;
      }

      list.innerHTML = display.map(t => {
        const tags = parseTags(t.tags);
        const tagsHtml = tags.length
          ? `<div class="todo-tags">${tags.map(tag =>
              `<span class="tag-chip" style="${tagStyle(tag)}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</span>`
            ).join('')}</div>`
          : '';
        return `
          <div class="todo-item ${t.status === 'Done' ? 'done' : ''} ${t.pinned === 'Yes' ? 'pinned' : ''}" id="item-${t.id}">
            <input type="checkbox" class="todo-check"
              ${t.status === 'Done' ? 'checked disabled' : ''}
              onchange="markDone(${t.id})">
            <button class="pin-btn ${t.pinned === 'Yes' ? 'active' : ''}" onclick="pinTodo(${t.id})" title="Pin to top">📌</button>
            <div class="todo-body">
              <div class="todo-name" data-id="${t.id}" data-name="${escapeHtml(t.name)}" title="Click to edit">${escapeHtml(t.name)}</div>
              ${tagsHtml}
            </div>
            <span class="badge ${diffClass[t.difficulty] || ''}">${t.difficulty}</span>
            <div class="todo-date">${t.date.slice(0, 10)}</div>
            <button class="btn-sm remove-btn" onclick="removeTodo(${t.id})">Remove</button>
          </div>`;
      }).join('');

      list.querySelectorAll('.todo-name').forEach(el => {
        el.addEventListener('click', () => startEdit(parseInt(el.dataset.id), el.dataset.name));
      });
      list.querySelectorAll('.tag-chip').forEach(el => {
        el.addEventListener('click', e => {
          e.stopPropagation();
          document.getElementById('tag-filter').value = el.dataset.tag;
          render();
        });
      });
    }

    async function addTodo() {
      const name       = document.getElementById('name').value.trim();
      const difficulty = document.getElementById('difficulty').value;
      const tags       = document.getElementById('tags').value.trim();
      if (!name) return;
      await fetch('/todos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, difficulty, tags })
      });
      document.getElementById('name').value = '';
      document.getElementById('tags').value = '';
      await loadTodos();
    }

    document.getElementById('name').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    async function markDone(id) {
      await fetch(`/todos/${id}/done`, { method: 'PATCH' });
      await loadTodos();
    }

    async function removeTodo(id) {
      if (!confirm('Remove this to-do? This cannot be undone.')) return;
      await fetch(`/todos/${id}`, { method: 'DELETE' });
      await loadTodos();
    }

    async function pinTodo(id) {
      await fetch(`/todos/${id}/pin`, { method: 'PATCH' });
      await loadTodos();
    }

    function startEdit(id, currentName) {
      const item = document.getElementById(`item-${id}`);
      if (!item) return;
      const nameEl = item.querySelector('.todo-name');
      if (!nameEl) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'edit-input';
      input.value = currentName;
      nameEl.replaceWith(input);
      input.focus();
      input.select();

      let saved = false;
      async function save() {
        if (saved) return;
        saved = true;
        const newName = input.value.trim();
        if (newName && newName !== currentName) {
          await fetch(`/todos/${id}/rename`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: newName })
          });
        }
        await loadTodos();
      }

      input.addEventListener('keydown', e => {
        if (e.key === 'Enter')  save();
        if (e.key === 'Escape') { saved = true; loadTodos(); }
      });
      input.addEventListener('blur', save);
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    loadTodos();
  </script>
</body>
</html>
