<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f7f8fa;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      color: #1a1a1a;
    }

    /* Nav */
    nav {
      background: white;
      border-bottom: 1px solid #eee;
      padding: 20px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .brand { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
    .brand span { color: #2bae8e; }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .logout {
      font-size: 13px;
      font-weight: 500;
      color: #888;
      text-decoration: none;
      transition: color .2s;
    }
    .logout:hover { color: #1a1a1a; }

    /* Page content */
    main { max-width: 780px; margin: 0 auto; padding: 48px 24px; width: 100%; }

    .page-header { margin-bottom: 36px; }
    .page-header h1 {
      font-size: 32px;
      font-weight: 600;
      letter-spacing: -0.7px;
      margin-bottom: 6px;
    }
    .page-header p { font-size: 14px; color: #888; }

    /* Add todo form */
    .add-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
      padding: 24px 28px;
      margin-bottom: 24px;
    }
    .add-card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: #888; margin-bottom: 14px; }

    .add-row { display: flex; gap: 10px; align-items: center; }

    input[type="text"] {
      flex: 1;
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      background: #fafafa;
      color: #1a1a1a;
      outline: none;
      transition: border-color .2s, background .2s;
    }
    input[type="text"]:focus { border-color: #2bae8e; background: white; }

    select {
      padding: 11px 14px;
      font-size: 14px;
      font-family: inherit;
      border: 1.5px solid #e5e7eb;
      border-radius: 8px;
      background: #fafafa;
      color: #1a1a1a;
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }
    select:focus { border-color: #2bae8e; }

    .btn-primary {
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      background: #2bae8e;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .2s;
    }
    .btn-primary:hover { background: #239b7e; }

    /* Filters */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-label { font-size: 13px; color: #888; margin-right: 4px; }

    /* Todo list */
    .todo-list { display: flex; flex-direction: column; gap: 10px; }

    .todo-item {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,.05);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      transition: box-shadow .2s;
    }
    .todo-item:hover { box-shadow: 0 4px 16px rgba(0,0,0,.09); }
    .todo-item.done { opacity: .55; }

    .todo-name {
      flex: 1;
      font-size: 15px;
      font-weight: 500;
    }
    .todo-item.done .todo-name { text-decoration: line-through; color: #aaa; }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }
    .badge-easy    { background: #e8f8f3; color: #1a7a5e; }
    .badge-medium  { background: #fff8e6; color: #926a00; }
    .badge-hard    { background: #fff1f1; color: #c0392b; }
    .badge-done    { background: #f0f0f0; color: #888; }
    .badge-pending { background: #eef6ff; color: #2a6db5; }

    .todo-date { font-size: 12px; color: #bbb; white-space: nowrap; }

    .actions { display: flex; gap: 6px; }
    .btn-sm {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 500;
      font-family: inherit;
      border-radius: 6px;
      border: 1.5px solid #e5e7eb;
      background: white;
      cursor: pointer;
      transition: all .15s;
      color: #555;
    }
    .btn-sm:hover { background: #f5f5f5; border-color: #ccc; }
    .btn-sm.done-btn:hover { background: #f0fdf9; border-color: #2bae8e; color: #2bae8e; }
    .btn-sm.remove-btn:hover { background: #fff2f2; border-color: #fcc; color: #c00; }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: #bbb;
      font-size: 15px;
    }
    .empty strong { display: block; font-size: 18px; font-weight: 500; margin-bottom: 6px; color: #ccc; }
  </style>
</head>
<body>
  <nav>
    <div class="brand">todo<span>tracker</span></div>
    <div class="nav-right">
      <a href="/logout" class="logout">Log out</a>
    </div>
  </nav>

  <main>
    <div class="page-header">
      <h1>My To-Dos</h1>
      <p>Track your tasks and stay on top of your work.</p>
    </div>

    <!-- Add form -->
    <div class="add-card">
      <div class="add-card-title">New To-Do</div>
      <div class="add-row">
        <input id="name" type="text" placeholder="What needs to be done?" required>
        <select id="difficulty">
          <option>Easy</option>
          <option>Medium</option>
          <option>Hard</option>
        </select>
        <button class="btn-primary" onclick="addTodo()">Add</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <span class="filter-label">Filter</span>
      <select id="filter" onchange="loadTodos()">
        <option value="All">All difficulties</option>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>
      <select id="sort" onchange="loadTodos()">
        <option value="">No sort</option>
        <option value="date">Sort by date</option>
        <option value="difficulty">Sort by difficulty</option>
      </select>
    </div>

    <!-- List -->
    <div class="todo-list" id="todo-list"></div>
  </main>

  <script>
    async function loadTodos() {
      const difficulty = document.getElementById("filter").value;
      const sort = document.getElementById("sort").value;
      const params = new URLSearchParams({ difficulty, sort });
      const res = await fetch(`/todos?${params}`);
      const todos = await res.json();
      const list = document.getElementById("todo-list");

      if (!todos.length) {
        list.innerHTML = `<div class="empty"><strong>Nothing here yet</strong>Add your first to-do above.</div>`;
        return;
      }

      const diffClass = { Easy: "badge-easy", Medium: "badge-medium", Hard: "badge-hard" };

      list.innerHTML = todos.map(t => `
        <div class="todo-item ${t.status === 'Done' ? 'done' : ''}">
          <div class="todo-name">${t.name}</div>
          <span class="badge ${diffClass[t.difficulty] || ''}">${t.difficulty}</span>
          <span class="badge ${t.status === 'Done' ? 'badge-done' : 'badge-pending'}">${t.status}</span>
          <div class="todo-date">${t.date.slice(0, 10)}</div>
          <div class="actions">
            ${t.status !== 'Done'
              ? `<button class="btn-sm done-btn" onclick="markDone(${t.id})">Done</button>`
              : ''}
            <button class="btn-sm remove-btn" onclick="removeTodo(${t.id})">Remove</button>
          </div>
        </div>`).join("");
    }

    async function addTodo() {
      const name = document.getElementById("name").value.trim();
      const difficulty = document.getElementById("difficulty").value;
      if (!name) return;
      await fetch("/todos", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name, difficulty })
      });
      document.getElementById("name").value = "";
      loadTodos();
    }

    document.getElementById("name").addEventListener("keydown", e => {
      if (e.key === "Enter") addTodo();
    });

    async function markDone(id) {
      await fetch(`/todos/${id}/done`, { method: "PATCH" });
      loadTodos();
    }

    async function removeTodo(id) {
      await fetch(`/todos/${id}`, { method: "DELETE" });
      loadTodos();
    }

    loadTodos();
  </script>
</body>
</html>
